server {
    listen 80;
    server_name localhost;

    # Front-controller Slim : tout passe par public/index.php
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Exécution PHP via PHP-FPM (TCP, image officielle php:8.2-fpm)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Sécurité : interdire l'accès aux fichiers cachés
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
