<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
</head>
<body class="flex flex-col min-h-screen p-6 gap-4">

<div>
  <!-- navbar mobile -->
  <div class="lg:hidden">
    <div class="navbar bg-[var(--color-principal)] h-25 text-white relative">
      <a class="normal-case text-xl absolute left-1/2 -translate-x-1/2" href="../index.html"><img src="../assets/logo.svg" alt="Logo" class="w-20 py-1"></a>
      <div class="flex-none ml-auto">
        <button class="btn btn-square btn-ghost" id="menu-toggle">
          <img src="../assets/burger-menu-svgrepo-com (1).svg" alt="Menu" class="w-6 h-6">
        </button>
      </div>
  </div>
  <!-- menu burger -->
  <div class="burger_menu bg-[var(--color-principal)] text-white z-100 rounded-box m-3" id="burger-menu">
    <ul class="menu rounded-box w-56">
  <li><a href="./Dashboard.html">dashboard</a></li>
  <li><a href="./fichecontact.html">Fiche contact</a></li>
  <li><a href="./stats.html">Stats</a></li>
  <li><a href="../../index.html">Déconnexion</a></li>
</ul>
  </div>
  

  </div>


<div class="">
  <div class="drawer drawer-open">
  <input id="my-drawer-4" type="checkbox" class="drawer-toggle" checked />
  <div class="drawer-content">
    <!-- Navbar -->
    <nav class="navbar w-full bg-[var(--color-principal)] text-white hidden lg:block">
      <div class="px-4"> <img src="../assets/logo.png" alt="Logo" class="h-13" /> </div>
    </nav>
    <div class="p-4 lg:p-6 w-full">
    <!-- Page content ici -->
      <h1 class="text-2xl font-bold text-[var(--color-principal)] mb-4">Page Contact</h1>

      <!-- bandeau d'état (connexion / chargement / erreur) -->
      <div id="api-status" class="text-sm mb-3 text-gray-600"></div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 min-h-[calc(100vh-260px)]">

        <!-- ============ Les Groupes ============ -->
        <section class="lg:col-span-3 bg-[var(--color-cards)] rounded-2xl p-5 shadow-[0_10px_30px_rgba(0,0,0,0.15)] border border-gray-200">
          <h2 class="text-xl font-bold text-[var(--color-principal)] mb-4">Les Groupes</h2>
          <div id="groupes-list" class="flex flex-col gap-3">
            <!-- les groupes Brevo sont injectés ici -->
            <div class="skeleton h-10 w-full rounded-full"></div>
            <div class="skeleton h-10 w-full rounded-full"></div>
            <div class="skeleton h-10 w-full rounded-full"></div>
          </div>
        </section>

        <!-- ============ Liste des contacts ============ -->
        <section class="lg:col-span-6 bg-[var(--color-cards)] rounded-2xl p-5 shadow-[0_10px_30px_rgba(0,0,0,0.15)] border border-gray-200 flex flex-col">
          <h2 class="text-xl font-bold text-[var(--color-principal)] text-center mb-3" id="contacts-title">Listes de tous les contacts</h2>

          <div class="flex items-center justify-between mb-3">
            <button type="button" id="btn-ajouter" class="btn btn-sm bg-[var(--color-principal)] text-white rounded-full border-0 px-4">Ajouter</button>
            <button type="button" id="btn-filtre-toggle" class="btn btn-sm btn-ghost btn-square" title="Afficher / masquer les filtres">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-[var(--color-principal)]"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
            </button>
          </div>

          <div id="contacts-list" class="flex flex-col gap-2 flex-1 overflow-y-auto max-h-[70vh] pr-1">
            <!-- les contacts Brevo sont injectés ici -->
          </div>

          <div class="flex items-center justify-center gap-3 mt-4">
            <button type="button" id="btn-precedent" class="btn btn-sm bg-[var(--color-principal)] text-white rounded-full border-0 px-5">Précédent</button>
            <span id="page-info" class="text-sm text-gray-500"></span>
            <button type="button" id="btn-suivant" class="btn btn-sm bg-[var(--color-principal)] text-white rounded-full border-0 px-5">Suivant</button>
          </div>
        </section>

        <!-- ============ Colonne 3 : Filtre ============ -->
        <section id="filtre-panel" class="lg:col-span-3 bg-[var(--color-cards)] rounded-2xl p-5 shadow-[0_10px_30px_rgba(0,0,0,0.15)] border border-gray-200 h-fit">
          <h2 class="text-xl font-bold text-[var(--color-principal)] mb-4">Filtre</h2>
          <div class="flex flex-col gap-3">
            <label class="flex items-center justify-between cursor-pointer">
              <span>Alphabétique</span>
              <input type="checkbox" class="checkbox" data-filtre="alpha" />
            </label>
            <label class="flex items-center justify-between cursor-pointer">
              <span>Récent</span>
              <input type="checkbox" class="checkbox" data-filtre="recent" />
            </label>
            <label class="flex items-center justify-between cursor-pointer">
              <span>Weezevent</span>
              <input type="checkbox" class="checkbox" data-filtre="weezevent" />
            </label>
            <label class="flex items-center justify-between cursor-pointer">
              <span>Brevo</span>
              <input type="checkbox" class="checkbox" data-filtre="brevo" />
            </label>
          </div>
        </section>

      </div>

        <!-- Fin content -->
    </div>
  </div>

  <div class="drawer-side is-drawer-close:overflow-visible text-white hidden lg:block">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <div class="flex min-h-full flex-col items-start bg-base-200 is-drawer-close:w-14 is-drawer-open:w-64">
      <!-- Sidebar content here -->
      <ul class="menu w-full grow bg-[var(--color-principal)]">
        <!-- List item -->
        <li>
          <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
        <!-- Sidebar toggle icon -->
        <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path><path d="M9 4v16"></path><path d="M14 10l2 2l-2 2"></path></svg>
      </label>
          <a href="./Dashboard.html" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Homepage">
            <!-- Home icon -->
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span class="is-drawer-close:hidden">Dashboard</span>
          </a>
        </li>

        <!-- List item -->
        <li>
          <a href="./stats.html" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Stats">
            <!-- Stats icon -->
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>
            <span class="is-drawer-close:hidden">Stats</span>
          </a>
        </li>
        <li>
          <a href="./fichecontact.html" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Fiche contact">
            <!-- Contact icon -->
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><circle cx="12" cy="8" r="4"></circle><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path></svg>
            <span class="is-drawer-close:hidden">Fiche Contact</span>
          </a>
        </li>

        <li class="mt-auto">
          <a href="../../index.html" class="is-drawer-close:tooltip is-drawer-close:tooltip-right" data-tip="Déconnexion">
            <!-- Logout icon -->
            <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span class="is-drawer-close:hidden">déconexion</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
