<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard — Nice Volley Ball</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-900 text-white px-6 py-4 flex items-center gap-6">
        <span class="font-bold text-lg">🏐 Nice Volley Ball</span>
        <a href="dashboard.html" class="hover:underline">Dashboard</a>
        <a href="contacts.html" class="hover:underline">Contacts</a>
        <a href="segments.html" class="hover:underline">Segments</a>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Tableau de bord</h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">Total contacts</p>
                <p id="total-contacts" class="text-4xl font-bold text-blue-900 mt-1">—</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">Via Weezevent</p>
                <p id="weezevent-contacts" class="text-4xl font-bold text-blue-600 mt-1">—</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">Via Brevo</p>
                <p id="brevo-contacts" class="text-4xl font-bold text-green-600 mt-1">—</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">Nouveaux (7j)</p>
                <p id="new-contacts" class="text-4xl font-bold text-orange-500 mt-1">—</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-5">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Accès rapide</h2>
            <div class="flex gap-4">
                <a href="contacts.html"
                   class="bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-800">
                    Voir les contacts
                </a>
                <a href="segments.html"
                   class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-500">
                    Voir les segments
                </a>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
