<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Segments — Nice Volley Ball</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-900 text-white px-6 py-4 flex items-center gap-6">
        <span class="font-bold text-lg">🏐 Nice Volley Ball</span>
        <a href="dashboard.html" class="hover:underline">Dashboard</a>
        <a href="contacts.html" class="hover:underline">Contacts</a>
        <a href="segments.html" class="hover:underline font-bold">Segments</a>
        <a href="sync.html" class="hover:underline">Synchronisation</a>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Segments</h1>

        <div id="segments-list" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <p class="text-gray-500">Chargement...</p>
        </div>

        <div id="segment-contacts" class="hidden bg-white rounded-xl shadow p-6">
            <h2 id="segment-title" class="text-xl font-semibold mb-4 text-gray-700"></h2>
            <table class="w-full text-left">
                <thead class="bg-blue-900 text-white">
                    <tr>
                        <th class="p-3">Prénom</th>
                        <th class="p-3">Nom</th>
                        <th class="p-3">Email</th>
                        <th class="p-3">Source</th>
                    </tr>
                </thead>
                <tbody id="segment-table-body"></tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        async function loadSegments() {
            const container = document.getElementById("segments-list");

            try {
                const result = await apiGet("/segments");
                container.innerHTML = "";

                result.data.forEach(segment => {
                    const card = document.createElement("div");
                    card.className = "bg-white rounded-xl shadow p-5 cursor-pointer hover:shadow-md transition";
                    card.innerHTML = `
                        <h3 class="text-lg font-semibold text-blue-900 mb-1">${segment.label}</h3>
                        <p class="text-gray-500 text-sm mb-3">${segment.description}</p>
                        <button class="bg-blue-900 text-white px-4 py-1 rounded text-sm hover:bg-blue-800">
                            Voir les contacts
                        </button>
                    `;
                    card.onclick = () => loadSegmentContacts(segment.id, segment.label);
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `<p class="text-red-600">Erreur : ${error.message}</p>`;
            }
        }

        async function loadSegmentContacts(segmentId, label) {
            const section = document.getElementById("segment-contacts");
            const title   = document.getElementById("segment-title");
            const tbody   = document.getElementById("segment-table-body");

            section.classList.remove("hidden");
            title.textContent = label;
            tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">Chargement...</td></tr>`;

            try {
                const result = await apiGet(`/segments/${segmentId}/contacts`);
                tbody.innerHTML = "";

                if (result.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">Aucun contact dans ce segment</td></tr>`;
                    return;
                }

                result.data.forEach(contact => {
                    const row = document.createElement("tr");
                    row.className = "border-b hover:bg-gray-50";
                    row.innerHTML = `
                        <td class="p-3">${contact.first_name}</td>
                        <td class="p-3">${contact.last_name}</td>
                        <td class="p-3">${contact.email}</td>
                        <td class="p-3">
                            <span class="px-2 py-1 rounded text-xs font-semibold
                                ${contact.source === 'weezevent' ? 'bg-blue-100 text-blue-700' :
                                  contact.source === 'brevo' ? 'bg-green-100 text-green-700' :
                                  'bg-gray-100 text-gray-700'}">
                                ${contact.source}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                section.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-600">Erreur : ${error.message}</td></tr>`;
            }
        }

        document.addEventListener("DOMContentLoaded", loadSegments);
    </script>
</body>
</html>
