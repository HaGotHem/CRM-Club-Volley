version: "3.9"

services:

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/proxy/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web-app
    networks:
      - frontend
      - backend

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slim-web-app
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      - APP_ENV=production
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
      - redis
    networks:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    container_name: cache-queue
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend

  db:
    image: postgres:16
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend

  adminer:
    image: adminer
    container_name: database-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - backend

  portainer:
    image: portainer/portainer-ce:latest
    container_name: container-admin
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  portainer_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
