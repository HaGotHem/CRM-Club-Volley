services:

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web-app
      - frontend
    networks:
      - frontend
      - backend

  # Frontend : serveur de développement Vite (Tailwind v4 + daisyui)
  frontend:
    image: node:22-alpine
    container_name: frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    networks:
      - frontend

  # Backend : API Slim (nginx + php-fpm)
  web-app:
    build:
      context: ./app/Backend
      dockerfile: Dockerfile
    container_name: slim-web-app
    restart: unless-stopped
    ports:
      - "8888:80"   # accès direct au backend (debug) : http://localhost:8888/api/health
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=appuser
      - DB_PASSWORD=secretpassword
    volumes:
      # Édition live du code PHP sans rebuild ; vendor reste celui de l'image
      - ./app/Backend:/var/www/html
      - /var/www/html/src/vendor
    depends_on:
      - db
      - redis
    networks:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    container_name: cache-queue
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend

  db:
    image: postgres:16
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend

  adminer:
    image: adminer
    container_name: database-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - backend

  portainer:
    image: portainer/portainer-ce:latest
    container_name: container-admin
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  portainer_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
