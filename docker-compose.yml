version: "3.9"

services:

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slim-web-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_USER=appuser
      - DB_PASSWORD=secretpassword
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: database-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
