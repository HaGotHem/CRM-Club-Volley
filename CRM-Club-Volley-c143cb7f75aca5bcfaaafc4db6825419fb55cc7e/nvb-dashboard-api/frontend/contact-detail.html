<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Fiche contact — Nice Volley Ball</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-900 text-white px-6 py-4 flex items-center gap-6">
        <span class="font-bold text-lg">🏐 Nice Volley Ball</span>
        <a href="dashboard.html" class="hover:underline">Dashboard</a>
        <a href="contacts.html" class="hover:underline">Contacts</a>
        <a href="segments.html" class="hover:underline">Segments</a>
    </nav>

    <main class="max-w-3xl mx-auto p-6">
        <a href="contacts.html" class="text-blue-700 hover:underline mb-4 inline-block">
            ← Retour aux contacts
        </a>

        <div id="contact-card" class="bg-white rounded-xl shadow p-6">
            <p class="text-gray-500">Chargement...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        async function loadContact() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!id) {
                document.getElementById("contact-card").innerHTML =
                    '<p class="text-red-600">ID contact manquant.</p>';
                return;
            }

            try {
                const result = await apiGet(`/contacts/${id}`);
                const c = result.data;

                document.getElementById("contact-card").innerHTML = `
                    <h2 class="text-2xl font-bold text-blue-900 mb-4">
                        ${c.first_name} ${c.last_name}
                    </h2>
                    <div class="grid grid-cols-2 gap-4 text-gray-700">
                        <div>
                            <p class="text-sm text-gray-500">Email</p>
                            <p class="font-medium">${c.email}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Téléphone</p>
                            <p class="font-medium">${c.phone ?? "—"}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Source</p>
                            <p class="font-medium">${c.source ?? "—"}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Créé le</p>
                            <p class="font-medium">${new Date(c.created_at).toLocaleDateString('fr-FR')}</p>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById("contact-card").innerHTML =
                    `<p class="text-red-600">Erreur : ${error.message}</p>`;
            }
        }

        document.addEventListener("DOMContentLoaded", loadContact);
    </script>
</body>
</html>
