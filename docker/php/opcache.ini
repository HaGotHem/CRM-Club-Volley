; Configuration OPcache — accélère drastiquement le bootstrap PHP.
; Sans OPcache, l'intégralité du code (Slim, Twig, PSR-7, etc.) est recompilée
; en bytecode à CHAQUE requête. Avec OPcache, le bytecode est gardé en mémoire.
opcache.enable=1
opcache.enable_cli=0

; Mémoire allouée au cache de bytecode (Mo)
opcache.memory_consumption=128
; Mémoire pour les chaînes internées partagées (Mo)
opcache.interned_strings_buffer=16
; Nombre max de fichiers mis en cache (largement suffisant pour ce projet)
opcache.max_accelerated_files=20000

; Revalidation : on vérifie l'horodatage des fichiers toutes les 2s.
; Indispensable ici car le code est monté en volume (bind-mount) : permet de
; prendre en compte les modifications de code sans rebuild. En production
; stricte (sans bind-mount), passer validate_timestamps=0 pour gagner encore.
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Conserve les commentaires (nécessaire à certaines libs utilisant les annotations)
opcache.save_comments=1

; Cache des chemins résolus (réduit les appels stat() du système de fichiers,
; particulièrement coûteux sur un bind-mount Windows -> conteneur Linux)
realpath_cache_size=4096K
realpath_cache_ttl=600
